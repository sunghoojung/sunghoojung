name: Update profile stats

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate age and GitHub stats
        env:
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || github.token }}
        run: python profile_stats.py
      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats_light.svg stats_dark.svg
          git diff --cached --quiet || git commit -m "chore: update profile stats"
          git push
